<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silent Flight Experience</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(180, 80, 20, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(100, 40, 0, 0.1) 0%, transparent 60%);
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 32px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .dadi-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(220, 120, 30, 0.5));
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #e8c97a;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 3px;
      color: #8a7060;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .earphones-hint {
      font-size: 12px;
      color: #6a5a4a;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    #start {
      background: linear-gradient(135deg, #c8702a, #e8a040);
      color: #fff;
    }

    #stop {
      background: transparent;
      color: #8a6040;
      border: 1px solid #3a2a1a;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #status {
      font-size: 13px;
      letter-spacing: 1px;
      color: #7a6a5a;
      min-height: 20px;
      margin-bottom: 24px;
    }

    #player {
      display: none;
      width: 100%;
    }

    #progress-track {
      width: 100%;
      height: 2px;
      background: #2a1a0a;
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c8702a, #e8c97a);
      border-radius: 1px;
      transition: width 0.5s linear;
    }

    #time-display {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #5a4a3a;
      letter-spacing: 1px;
    }

    #download-prompt {
      display: none;
      margin-top: 8px;
      padding: 16px;
      background: #110d08;
      border: 1px solid #2a1a0a;
      border-radius: 12px;
    }

    #download-prompt p {
      font-size: 12px;
      color: #6a5a4a;
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #3a2a1a, transparent);
      margin-bottom: 28px;
    }

    #earphone-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      padding: 10px 18px;
      border-radius: 50px;
      background: #110d08;
      border: 1px solid #2a1a0a;
      transition: border-color 0.3s;
    }

    #earphone-row.confirmed  { border-color: #4a7a3a; }
    #earphone-row.speakers   { border-color: #7a3a2a; }

    #earphone-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3a2a1a;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #earphone-row.confirmed  #earphone-dot { background: #5a9a4a; }
    #earphone-row.speakers   #earphone-dot { background: #c0522a; }

    #earphone-text { color: #6a5a4a; }
    #earphone-row.confirmed  #earphone-text { color: #7ab06a; }

    #confirm-earphones {
      display: none;
      margin-bottom: 20px;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid #4a3a2a;
      color: #b08060;
      font-size: 12px;
      letter-spacing: 1px;
    }

    #confirm-earphones:hover:not(:disabled) {
      border-color: #8a6040;
      color: #e8a060;
    }
  </style>
</head>

<body>
  <div class="container">
    <img class="dadi-img" src="Dadi.jpeg" alt="Dadi" />

    <h1>Silent Flight</h1>
    <p class="subtitle">Experience</p>

    <div class="divider"></div>

    <div id="earphone-row">
      <span id="earphone-dot"></span>
      <span id="earphone-text">Checking audio output...</span>
    </div>

    <button id="confirm-earphones">I have earphones in</button>

    <div class="buttons">
      <button id="start" disabled>Start</button>
      <button id="stop" disabled>Stop</button>
    </div>

    <p id="status">Checking audio...</p>

    <div id="player">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="time-display">
        <span id="current-time">0:00</span>
        <span id="remaining-time">-0:00</span>
      </div>
    </div>

    <div id="download-prompt">
      <p>Audio not available offline. Connect to the internet once to load it — after that it works without internet.</p>
    </div>

    <audio id="audio" src="audio.mp3" preload="auto"></audio>
  </div>

  <script src="app.js"></script>
</body>
</html>
